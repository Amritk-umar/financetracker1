# Render Blueprint: connect the repo and apply this file, or create a Web Service manually.
# Use repo root (leave Root Directory EMPTY in dashboard). Root package.json runs build/start in frontend/.
# If Root Directory is "src", src/package.json also exists as a fallback. Never set Root Directory to "src" unless that file is on GitHub.
# Convex runs on Convex Cloud (https://dashboard.convex.dev), not on Render.
# Optional: push Convex on each deploy — set CONVEX_DEPLOY_KEY, then use:
#   buildCommand: cd frontend && npm ci && npx convex deploy --cmd "npm run build"
services:
  - type: web
    name: finance-tracker
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_CONVEX_URL
        sync: false
      - key: NEXT_PUBLIC_GEMINI_API_KEY
        sync: false

# --- Backend Service (FastAPI) ---
  - type: web
    name: finance-tracker-api
    runtime: python
    plan: free
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.0"        
